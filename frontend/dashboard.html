<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard VacinTech - Monitoramento Real-Time</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container {
            width: 80%;
            margin: auto;
        }

        #status-box {
            text-align: center;
            font-family: sans-serif;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div id="status-box">
        <h1>VacinTech: Monitoramento de Vacinas</h1>
        <p>Temperatura Atual: <span id="temp-atual">4.7</span>°C</p>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

   <script>
const ctx = document.getElementById('myChart').getContext('2d');
const myChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
        datasets: [{
            label: 'Temperatura Média',
            data: [4.5, 5.0, 4.3, 4.1, 3.7, 4.0],
            backgroundColor: ['rgb(54, 162, 235)'],
            borderColor: ['rgb(54, 162, 235)'],
            borderWidth: 1
            
        }
    
    ]
 },   
    options: {
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>
</body>

</html>
